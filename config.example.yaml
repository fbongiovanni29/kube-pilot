# kube-pilot configuration

llm:
  # Any OpenAI-compatible API: Anthropic, OpenAI, Ollama, LiteLLM, vLLM
  provider: anthropic
  base_url: https://api.anthropic.com
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  timeout: 120s

github:
  # Webhook secret for signature verification (optional but recommended)
  webhook_secret: ${GITHUB_WEBHOOK_SECRET}

  # Repos to watch for issues/comments
  repos:
    - your-org/your-repo
    # - your-org/infra

server:
  address: ":8080"

cluster:
  # Git repo for infrastructure manifests (ArgoCD, Tekton, etc.)
  infra_repo: your-org/infra

# Cross-session context system (optional)
context:
  enabled: true
  # Repo where kube-pilot stores cross-session insights
  repo: kube-pilot/kube-pilot-context
  # File to read from repos for agent instructions (default: AGENTS.md)
  agents_file: AGENTS.md

# Observability — metrics, logs, dashboards, alerts (optional)
# Enable via Helm (kubePrometheusStack.enabled + loki.enabled) or point at existing services.
observability:
  enabled: false
  prometheus:
    url: http://kube-pilot-kube-prometheus-stack-prometheus.kube-pilot.svc:9090
  grafana:
    url: http://kube-pilot-kube-prometheus-stack-grafana.kube-pilot.svc:80
    api_key: ${GRAFANA_API_KEY}
  loki:
    url: http://kube-pilot-loki.kube-pilot.svc:3100
  alertmanager:
    url: http://kube-pilot-kube-prometheus-stack-alertmanager.kube-pilot.svc:9093

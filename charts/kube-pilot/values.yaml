# kube-pilot configuration

replicaCount: 1

image:
  repository: ghcr.io/fbongiovanni29/kube-pilot
  tag: latest
  pullPolicy: IfNotPresent
  pullSecret: ""

# LLM provider configuration
llm:
  # Any OpenAI-compatible API: anthropic, openai, ollama
  provider: anthropic
  baseURL: https://api.anthropic.com
  model: claude-sonnet-4-6
  # API key — stored in Vault, referenced via ExternalSecret
  apiKey: ""

# Git provider: gitea (bundled) or github (external)
git:
  provider: gitea     # gitea or github

# Gitea settings (when git.provider=gitea)
# Webhook is automatic — same cluster network, no public URL needed.

# GitHub settings (when git.provider=github)
github:
  mode: poll           # poll (no public URL needed) or webhook
  pollInterval: 30s
  webhookSecret: ""
  repos: []
  # GitHub App auth (comments as bot instead of personal account)
  app:
    enabled: false
    appID: ""
    installationID: ""
    privateKey: ""     # PEM-encoded private key (stored in Vault if vault.enabled)

# Git repo for infrastructure manifests
cluster:
  infraRepo: kube-pilot/infra
  registryURL: ""  # Container registry URL (auto-detected from Gitea if empty)

# Cross-session context system
context:
  enabled: true
  repo: kube-pilot/kube-pilot-context
  agentsFile: AGENTS.md

# Webhook server
service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: traefik
  host: ""              # e.g. "apps.example.com" — services get <name>.apps.example.com
  annotations: {}
  tls: false
  clusterIssuer: ""     # cert-manager ClusterIssuer (e.g. "letsencrypt-prod")

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- Platform components (all optional) ---

gitea:
  enabled: true
  gitea:
    admin:
      username: kube-pilot
      password: ""           # Set at install time
      email: admin@local
      passwordMode: keepUpdated  # Prevents must-change-password blocking API auth
    config:
      server:
        ROOT_URL: http://kube-pilot-gitea-http.kube-pilot.svc:3000
        DOMAIN: kube-pilot-gitea-http.kube-pilot.svc
      packages:
        ENABLED: true        # Container registry
        CHUNKED_UPLOAD_PATH: /data/gitea/tmp/package-upload
      actions:
        ENABLED: true        # Gitea Actions (available but Tekton is primary CI)
      webhook:
        ALLOWED_HOST_LIST: "*"
  persistence:
    enabled: true
    size: 5Gi

vault:
  enabled: true
  server:
    dev:
      enabled: true         # Dev mode for quick start — disable in production
    dataStorage:
      size: 1Gi

externalSecrets:
  enabled: true

argocd:
  enabled: true
  argo-cd:
    server:
      extraArgs:
        - --insecure       # TLS terminated at ingress

tekton:
  enabled: true

certManager:
  enabled: false
  # cert-manager subchart values — see https://cert-manager.io/docs/installation/helm/
  acmeEmail: ""         # Email for Let's Encrypt registration
  crds:
    enabled: true       # Install CRDs with the chart

traefik:
  enabled: false
  # Traefik subchart values — see https://github.com/traefik/traefik-helm-chart
  # Sensible defaults for kube-pilot; override as needed.
  ingressClass:
    enabled: true
    isDefaultClass: true
  ports:
    web:
      port: 8000
      exposedPort: 80
    websecure:
      port: 8443
      exposedPort: 443
  service:
    type: LoadBalancer    # NodePort for bare metal / k3s without cloud LB
  # Enable dashboard for debugging (disable in production)
  ingressRoute:
    dashboard:
      enabled: false

externalDNS:
  enabled: false
  # ExternalDNS subchart values — see https://kubernetes-sigs.github.io/external-dns
  # Set your DNS provider and domain filters. Credentials are injected from the
  # external-dns-credentials secret (synced from Vault if vault.enabled, or create manually).
  #
  # Provider env vars to put in the secret:
  #   Cloudflare:  CF_API_TOKEN
  #   AWS Route53: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (or use IRSA)
  #   Google:      GOOGLE_APPLICATION_CREDENTIALS (mount a service account JSON)
  #   Azure:       AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
  #   DigitalOcean: DO_TOKEN
  provider:
    name: ""              # cloudflare, aws, google, azure, digitalocean, etc.
  envFrom:
    - secretRef:
        name: external-dns-credentials
  domainFilters: []       # e.g. ["apps.yourdomain.com"]
  policy: upsert-only     # upsert-only = safe, sync = deletes stale records
  sources:
    - ingress

kubePrometheusStack:
  enabled: false
  # kube-prometheus-stack subchart values — see https://github.com/prometheus-community/helm-charts
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
  grafana:
    adminPassword: ""    # Set at install time or via Vault
    persistence:
      enabled: true
      size: 5Gi

loki:
  enabled: false
  # Loki subchart values — see https://grafana.github.io/helm-charts
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  # Disable components not needed in SingleBinary mode
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

# Observability config passed to the kube-pilot agent
observability:
  enabled: false
  prometheus:
    url: ""       # Auto-detected from subchart when empty
  grafana:
    url: ""       # Auto-detected from subchart when empty
    apiKey: ""    # Stored in Vault if vault.enabled
  loki:
    url: ""       # Auto-detected from subchart when empty
  alertmanager:
    url: ""       # Auto-detected from subchart when empty

agent:
  # The base system prompt sent to the LLM. Customize this to change how the agent
  # thinks, plans, communicates, and prioritizes. Dynamic sections (ingress URLs,
  # observability endpoints, Crossplane guidance, repo context) are appended automatically.
  #
  # Template variables available:
  #   {{.GitProvider}}     — "gitea" or "github"
  #   {{.GiteaURL}}        — Gitea base URL (only when GitProvider=gitea)
  #   {{.GiteaHost}}       — Gitea hostname without scheme (only when GitProvider=gitea)
  #   {{.GiteaRegistryURL}} — Gitea container registry URL (only when GitProvider=gitea)
  #
  # To override: set agent.systemPrompt in your values override file.
  systemPrompt: |
    You are kube-pilot, an autonomous agent that builds, deploys, and operates software on Kubernetes.

    You are not just an infrastructure tool. You are a full development platform. You can:
    - Write application code in any language
    - Build container images via Tekton pipelines
    - Deploy services via git commits that ArgoCD syncs to the cluster
    - Debug running services by reading logs, exec-ing into pods, and inspecting state
    - Iterate autonomously: if a build fails, fix the code and retry

    {{if eq .GitProvider "gitea"}}
    Gitea (git server + container registry):
    - URL: {{.GiteaURL}}
    - Auth for API calls: curl -u $GITEA_USER:$GITEA_PASSWORD (env vars are pre-set, use them as-is — NEVER try to read or echo these values)
    - Clone repos: git clone http://$GITEA_USER:$GITEA_PASSWORD@{{.GiteaHost}}/<owner>/<repo>.git (replace the host from the URL)
    - Container registry: {{.GiteaRegistryURL}}
    - NEVER print, echo, log, or expose $GITEA_PASSWORD in any output
    {{else}}
    GitHub (source code hosting):
    - The source repo is on GitHub. Use the gh CLI and git_comment/git_close_issue tools.
    - Clone repos: gh repo clone <owner>/<repo> (GH_TOKEN is pre-set)
    - Use gh CLI for API operations: gh api repos/<owner>/<repo>/...
    - NEVER print, echo, or expose $GH_TOKEN in any output
    {{end}}

    Available CLI tools: kubectl, helm, git, curl, gh, argocd (via kubectl), and any standard CLI tool.

    ## Build & Deploy

    You have full shell access. Use it to build, deploy, and operate services end-to-end.

    Building images:
    - Create a Tekton TaskRun with Kaniko to build and push container images
    - The container registry is Gitea in-cluster (use --insecure and --skip-tls-verify for Kaniko)
    - Registry auth secret "gitea-registry-auth" exists in both kube-pilot and default namespaces
    - Poll the TaskRun status with kubectl until it succeeds or fails
    - If the build fails, read the logs, fix the issue, and retry

    Deploying:
    - Infrastructure repo (in Gitea): clone it, add/update manifests in apps/<app-name>/, commit, push
    - ArgoCD watches the infra repo and syncs automatically
    - To create a new ArgoCD Application: kubectl apply an Application manifest pointing to apps/<app-name>/ in the infra repo
    - To force immediate sync: kubectl patch the ArgoCD Application with a sync operation
    - Verify with kubectl get pods, kubectl logs, kubectl describe

    Rollback:
    - Revert the image tag in the infra repo deployment manifest, commit, push
    - ArgoCD will sync the rollback automatically

    Important:
    - Use git_comment and git_close_issue tools to interact with issues (don't curl for that)
    - Configure git before committing: git config --global user.email "kube-pilot@local" && git config --global user.name "kube-pilot"

    Rules:
    - ALL persistent cluster changes go through git → ArgoCD (kubectl apply is fine for one-shot Tekton TaskRuns)
    - For secrets, create ExternalSecret resources that reference Vault
    - Always explain what you're about to do before doing it
    - If something fails: read logs, diagnose, fix the code, and retry
    - If you can't fix it after 3 attempts, escalate to the user
    - NEVER expose credentials in comments, logs, or output

    When you're done, comment on the issue with a summary and close it.

crossplane:
  enabled: false
  # Crossplane subchart values — see https://docs.crossplane.io/latest/software/install/
  # Crossplane's defaults are sensible. Install Providers separately via Provider CRs.
  # Cloud credentials are injected via Vault + ExternalSecret into ProviderConfigs.

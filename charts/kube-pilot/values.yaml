# kube-pilot configuration

replicaCount: 1

image:
  repository: ghcr.io/fbongiovanni29/kube-pilot
  tag: latest
  pullPolicy: IfNotPresent
  pullSecret: ""

# LLM provider configuration
llm:
  # Any OpenAI-compatible API: anthropic, openai, ollama
  provider: anthropic
  baseURL: https://api.anthropic.com
  model: claude-sonnet-4-6
  # API key — stored in Vault, referenced via ExternalSecret
  apiKey: ""

# Git provider: gitea (bundled) or github (external)
git:
  provider: gitea     # gitea or github

# Gitea settings (when git.provider=gitea)
# Webhook is automatic — same cluster network, no public URL needed.

# GitHub settings (when git.provider=github)
github:
  mode: poll           # poll (no public URL needed) or webhook
  pollInterval: 30s
  webhookSecret: ""
  repos: []
  # GitHub App auth (comments as bot instead of personal account)
  app:
    enabled: false
    appID: ""
    installationID: ""
    privateKey: ""     # PEM-encoded private key (stored in Vault if vault.enabled)

# Git repo for infrastructure manifests
cluster:
  infraRepo: kube-pilot/infra
  registryURL: ""  # Container registry URL (auto-detected from Gitea if empty)

# Cross-session context system
context:
  enabled: true
  repo: kube-pilot/kube-pilot-context
  agentsFile: AGENTS.md

# Webhook server
service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: traefik
  host: ""              # e.g. "apps.example.com" — services get <name>.apps.example.com
  annotations: {}
  tls: false
  clusterIssuer: ""     # cert-manager ClusterIssuer (e.g. "letsencrypt-prod")

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- Platform components (all optional) ---

gitea:
  enabled: true
  gitea:
    admin:
      username: kube-pilot
      password: ""           # Set at install time
      email: admin@local
      passwordMode: keepUpdated  # Prevents must-change-password blocking API auth
    config:
      server:
        ROOT_URL: http://kube-pilot-gitea-http.kube-pilot.svc:3000
        DOMAIN: kube-pilot-gitea-http.kube-pilot.svc
      packages:
        ENABLED: true        # Container registry
        CHUNKED_UPLOAD_PATH: /data/gitea/tmp/package-upload
      actions:
        ENABLED: true        # Gitea Actions (available but Tekton is primary CI)
      webhook:
        ALLOWED_HOST_LIST: "*"
  persistence:
    enabled: true
    size: 5Gi

vault:
  enabled: true
  server:
    dev:
      enabled: true         # Dev mode for quick start — disable in production
    dataStorage:
      size: 1Gi

externalSecrets:
  enabled: true

argocd:
  enabled: true
  argo-cd:
    server:
      extraArgs:
        - --insecure       # TLS terminated at ingress

tekton:
  enabled: true

certManager:
  enabled: false
  # cert-manager subchart values — see https://cert-manager.io/docs/installation/helm/
  acmeEmail: ""         # Email for Let's Encrypt registration
  crds:
    enabled: true       # Install CRDs with the chart

traefik:
  enabled: false
  # Traefik subchart values — see https://github.com/traefik/traefik-helm-chart
  # Sensible defaults for kube-pilot; override as needed.
  ingressClass:
    enabled: true
    isDefaultClass: true
  ports:
    web:
      port: 8000
      exposedPort: 80
    websecure:
      port: 8443
      exposedPort: 443
  service:
    type: LoadBalancer    # NodePort for bare metal / k3s without cloud LB
  # Enable dashboard for debugging (disable in production)
  ingressRoute:
    dashboard:
      enabled: false

externalDNS:
  enabled: false
  # ExternalDNS subchart values — see https://kubernetes-sigs.github.io/external-dns
  # Set your DNS provider and domain filters. Credentials are injected from the
  # external-dns-credentials secret (synced from Vault if vault.enabled, or create manually).
  #
  # Provider env vars to put in the secret:
  #   Cloudflare:  CF_API_TOKEN
  #   AWS Route53: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (or use IRSA)
  #   Google:      GOOGLE_APPLICATION_CREDENTIALS (mount a service account JSON)
  #   Azure:       AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
  #   DigitalOcean: DO_TOKEN
  provider:
    name: ""              # cloudflare, aws, google, azure, digitalocean, etc.
  envFrom:
    - secretRef:
        name: external-dns-credentials
  domainFilters: []       # e.g. ["apps.yourdomain.com"]
  policy: upsert-only     # upsert-only = safe, sync = deletes stale records
  sources:
    - ingress

kubePrometheusStack:
  enabled: false
  # kube-prometheus-stack subchart values — see https://github.com/prometheus-community/helm-charts
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
  grafana:
    adminPassword: ""    # Set at install time or via Vault
    persistence:
      enabled: true
      size: 5Gi

loki:
  enabled: false
  # Loki subchart values — see https://grafana.github.io/helm-charts
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  # Disable components not needed in SingleBinary mode
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

# Observability config passed to the kube-pilot agent
observability:
  enabled: false
  prometheus:
    url: ""       # Auto-detected from subchart when empty
  grafana:
    url: ""       # Auto-detected from subchart when empty
    apiKey: ""    # Stored in Vault if vault.enabled
  loki:
    url: ""       # Auto-detected from subchart when empty
  alertmanager:
    url: ""       # Auto-detected from subchart when empty

crossplane:
  enabled: false
  # Crossplane subchart values — see https://docs.crossplane.io/latest/software/install/
  # Crossplane's defaults are sensible. Install Providers separately via Provider CRs.
  # Cloud credentials are injected via Vault + ExternalSecret into ProviderConfigs.

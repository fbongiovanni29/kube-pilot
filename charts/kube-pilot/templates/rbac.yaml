# Read-only cluster access for kube-pilot
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-pilot.fullname" . }}-reader
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
rules:
  # Read everything — pods, deployments, services, events, logs, etc.
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read ArgoCD resources
  - apiGroups: ["argoproj.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read Tekton resources
  - apiGroups: ["tekton.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read ExternalSecrets resources
  - apiGroups: ["external-secrets.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read ExternalDNS resources
  - apiGroups: ["externaldns.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# Tekton write access (cluster-wide for task runs in any namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-pilot.fullname" . }}-pipeline-runner
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-pilot.fullname" . }}-reader
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-pilot.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pilot.fullname" . }}
    namespace: kube-pilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-pilot.fullname" . }}-pipeline-runner
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-pilot.fullname" . }}-pipeline-runner
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pilot.fullname" . }}
    namespace: kube-pilot
---
# Secrets access scoped to kube-pilot namespace only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kube-pilot.fullname" . }}-secrets
  namespace: kube-pilot
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-pilot.fullname" . }}-secrets
  namespace: kube-pilot
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kube-pilot.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pilot.fullname" . }}
    namespace: kube-pilot
---
# Secrets access scoped to default namespace (for registry auth during builds)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kube-pilot.fullname" . }}-secrets
  namespace: default
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-pilot.fullname" . }}-secrets
  namespace: default
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kube-pilot.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pilot.fullname" . }}
    namespace: kube-pilot
{{- if .Values.crossplane.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-pilot.fullname" . }}-crossplane-admin
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pilot.fullname" . }}
    namespace: kube-pilot
{{- end }}

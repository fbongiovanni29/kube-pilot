apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-pilot.fullname" . }}-config
  namespace: kube-pilot
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
data:
  config.yaml: |
    llm:
      provider: {{ .Values.llm.provider }}
      base_url: {{ .Values.llm.baseURL }}
      api_key: ${LLM_API_KEY}
      model: {{ .Values.llm.model }}
      timeout: 120s

    git:
      provider: {{ .Values.git.provider }}

    {{- if eq .Values.git.provider "gitea" }}
    gitea:
      url: http://{{ .Release.Name }}-gitea-http.{{ .Release.Namespace }}.svc:3000
      admin_user: {{ .Values.gitea.gitea.admin.username }}
      admin_password: ${GITEA_ADMIN_PASSWORD}
    {{- end }}

    {{- if eq .Values.git.provider "github" }}
    github:
      mode: {{ .Values.github.mode }}
      poll_interval: {{ .Values.github.pollInterval }}
      webhook_secret: ${GITHUB_WEBHOOK_SECRET}
      {{- if .Values.github.app.enabled }}
      app_id: {{ .Values.github.app.appID | quote }}
      installation_id: {{ .Values.github.app.installationID | quote }}
      private_key_path: /etc/github/github-app-key.pem
      {{- end }}
      repos:
        {{- range .Values.github.repos }}
        - {{ . }}
        {{- end }}
    {{- end }}

    server:
      address: ":8080"

    cluster:
      infra_repo: {{ .Values.cluster.infraRepo }}
      {{- if .Values.cluster.registryURL }}
      registry_url: {{ .Values.cluster.registryURL }}
      {{- end }}

    {{- if .Values.context.enabled }}
    context:
      enabled: true
      repo: {{ .Values.context.repo }}
      agents_file: {{ .Values.context.agentsFile | default "AGENTS.md" }}
    {{- end }}

    {{- if .Values.ingress.enabled }}
    ingress:
      enabled: true
      class_name: {{ .Values.ingress.className | default "traefik" }}
      {{- if .Values.ingress.host }}
      domain: {{ .Values.ingress.host }}
      {{- end }}
      tls_enabled: {{ .Values.ingress.tls | default false }}
      {{- if .Values.ingress.clusterIssuer }}
      cluster_issuer: {{ .Values.ingress.clusterIssuer }}
      {{- end }}
    {{- end }}

    {{- if .Values.observability.enabled }}
    observability:
      enabled: true
      prometheus:
        url: {{ .Values.observability.prometheus.url | default (printf "http://%s-kube-prometheus-prometheus.%s.svc:9090" .Release.Name .Release.Namespace) }}
      grafana:
        url: {{ .Values.observability.grafana.url | default (printf "http://%s-grafana.%s.svc:80" .Release.Name .Release.Namespace) }}
        api_key: ${GRAFANA_API_KEY}
      loki:
        url: {{ .Values.observability.loki.url | default (printf "http://%s-loki.%s.svc:3100" .Release.Name .Release.Namespace) }}
      alertmanager:
        url: {{ .Values.observability.alertmanager.url | default (printf "http://%s-kube-prometheus-alertmanager.%s.svc:9093" .Release.Name .Release.Namespace) }}
    {{- end }}

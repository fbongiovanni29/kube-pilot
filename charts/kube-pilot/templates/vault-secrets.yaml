{{- if and .Values.vault.enabled .Values.externalSecrets.enabled }}
# Vault SecretStore — connects External Secrets to Vault
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: "http://{{ .Release.Name }}-vault.{{ .Release.Namespace }}.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "{{ .Release.Name }}-external-secrets"
---
# LLM API key — synced from Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kube-pilot.fullname" . }}-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: {{ include "kube-pilot.fullname" . }}-bootstrap
    creationPolicy: Merge
  data:
    - secretKey: LLM_API_KEY
      remoteRef:
        key: kube-pilot/llm
        property: api_key
{{- if and (eq .Values.git.provider "github") .Values.github.app.enabled }}
---
# GitHub App secrets — synced from Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kube-pilot.fullname" . }}-github-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: {{ include "kube-pilot.fullname" . }}-github-app
    creationPolicy: Owner
  data:
    - secretKey: github-app-key.pem
      remoteRef:
        key: kube-pilot/github
        property: app_private_key
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: kube-pilot/github
        property: webhook_secret
{{- end }}
{{- if .Values.externalDNS.enabled }}
---
# ExternalDNS credentials — synced from Vault
# Store provider-specific env vars at kube-pilot/dns in Vault.
# All key/value pairs are mapped into the secret as-is.
# e.g. for Cloudflare: vault kv put secret/kube-pilot/dns CF_API_TOKEN=xxx
# e.g. for AWS: vault kv put secret/kube-pilot/dns AWS_ACCESS_KEY_ID=xxx AWS_SECRET_ACCESS_KEY=xxx
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: external-dns-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: kube-pilot/dns
{{- end }}
{{- end }}

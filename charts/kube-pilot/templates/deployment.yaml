apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-pilot.fullname" . }}
  namespace: kube-pilot
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kube-pilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-pilot.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "kube-pilot.fullname" . }}
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
        - name: kube-pilot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/kube-pilot/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "kube-pilot.fullname" . }}-bootstrap
            {{- if and (eq .Values.git.provider "github") .Values.github.app.enabled }}
            - secretRef:
                name: {{ include "kube-pilot.fullname" . }}-github-app
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/kube-pilot
              readOnly: true
            {{- if and (eq .Values.git.provider "github") .Values.github.app.enabled }}
            - name: github-app-key
              mountPath: /etc/github
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kube-pilot.fullname" . }}-config
        {{- if and (eq .Values.git.provider "github") .Values.github.app.enabled }}
        - name: github-app-key
          secret:
            secretName: {{ include "kube-pilot.fullname" . }}-github-app
            items:
              - key: github-app-key.pem
                path: github-app-key.pem
        {{- end }}

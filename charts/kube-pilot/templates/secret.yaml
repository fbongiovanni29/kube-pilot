{{/*
Bootstrap secret — initial secrets before Vault/ExternalSecrets are wired up.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-pilot.fullname" . }}-bootstrap
  namespace: kube-pilot
  labels:
    {{- include "kube-pilot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.llm.apiKey }}
  LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
  {{- end }}
  {{- if .Values.github.webhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.github.webhookSecret | quote }}
  {{- end }}
  {{- if and .Values.gitea.enabled .Values.gitea.gitea.admin.password }}
  GITEA_ADMIN_PASSWORD: {{ .Values.gitea.gitea.admin.password | quote }}
  {{- end }}
